<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="view.title">Smart QR View</title>
        <meta name="description" content="View your SmartQR links — one scan, multiple connections." />
        <meta property="og:title" content="SmartQR — Your links, one scan away" />
        <meta property="og:description" content="One scan opens all the links — WhatsApp, Instagram, website, and more." />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://mrone-inc.github.io/SmartQR/icon-512.png" />
        <meta property="og:image:width" content="512" />
        <meta property="og:image:height" content="512" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="SmartQR — Your links, one scan away" />
        <meta name="twitter:description" content="One scan opens all the links — WhatsApp, Instagram, website, and more." />
        <meta name="twitter:image" content="https://mrone-inc.github.io/SmartQR/icon-512.png" />

        <!-- Favicons -->
        <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

        <link rel="stylesheet" href="style.css" />
        <meta name="theme-color" content="#4a2c0a" />
    </head>
    <body>
        <noscript>
            <div class="noscript-banner">
                JavaScript is required to view this SmartQR.
                <br />
                Tafadhali wezesha JavaScript ili kuona viungo vyako vya SmartQR.
            </div>
        </noscript>
        <div class="container" style="max-width: 480px;">
            <div class="view-page">
                <!-- Top switchers -->
                <div class="switcher-row">
                    <div class="theme-switcher">
                        <button class="theme-btn active" data-theme="light" onclick="setTheme('light')">
                            <span class="theme-dot dot-light"></span><span class="theme-label" data-i18n="theme.light">Light</span>
                        </button>
                        <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">
                            <span class="theme-dot dot-dark"></span><span class="theme-label" data-i18n="theme.dark">Dark</span>
                        </button>
                        <button class="theme-btn" data-theme="silver" onclick="setTheme('silver')">
                            <span class="theme-dot dot-silver"></span><span class="theme-label" data-i18n="theme.silver">Silver</span>
                        </button>
                        <button class="theme-btn" data-theme="gold" onclick="setTheme('gold')">
                            <span class="theme-dot dot-gold"></span><span class="theme-label" data-i18n="theme.gold">Gold</span>
                        </button>
                    </div>

                    <div class="lang-switcher" role="group" aria-label="Language">
                        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                        <button class="lang-btn" data-lang="sw" onclick="setLang('sw')">SW</button>
                    </div>
                </div>

                <!-- Business branding -->
                <div id="bizBranding" class="biz-branding hidden">
                    <div id="bizLogoView" class="biz-logo-wrapper"></div>
                </div>
                <h2 id="bizTitle" data-i18n="view.defaultTitle">Your Smart QR Links</h2>
                <p class="view-subtitle" id="viewSubtitle" data-i18n="view.subtitle">Tap a link to connect</p>

                <div id="linksContainer" class="link-grid">
                    <!-- Buttons will be injected here -->
                </div>
                <div id="actionRow" class="action-row hidden">
                    <button id="saveContactBtn" class="action-btn" type="button">
                        <span class="action-icon">&#x2B07;</span> <span data-i18n="view.action.saveContact">Save Contact</span>
                    </button>
                    <button id="shareBtn" class="action-btn" type="button">
                        <span class="action-icon">&#x21AA;</span> <span id="shareBtnLabel" data-i18n="view.action.share">Share</span>
                    </button>
                </div>
                <div class="view-footer">
                    <span data-i18n="view.poweredBy">Powered by</span>
                    <a href="https://mrone-inc.github.io/SmartQR/" target="_blank" rel="noopener noreferrer">SmartQR</a>
                    <span class="view-footer-sep">·</span>
                    <a href="https://mrone-inc.github.io" target="_blank" rel="noopener noreferrer">Mrone.Inc</a>
                </div>
            </div>
        </div>

        <script src="theme.js"></script>
        <script src="i18n.js"></script>
        <script src="view.js"></script>
    </body>
</html>
